<DOCTYPE html> 
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal de Notícias</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #00c8ff;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            padding: 30px;
            background-color: #ddd;
            border: 2px solid black;
        }

        .topo {
            width: 60%;
            height: 60px;
            margin: 0 auto 20px auto;
            background-color: white;
            border: 2px solid black;
            display: flex;
            justify-content: center; 
            align-items: center;     
            font-size: 24px;         
            font-weight: bold;       

        }

        .destaque {
            height: 120px;
            margin-bottom: 20px;
            background-color: white;
            border: 2px solid black;
            padding: 10px;
        }

        .noticias {
            display: flex;
            gap: 20px;
        }

        .noticia {
            flex: 1;
            height: 120px;
            background-color: white;
            border: 2px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="topo"> Página de Noticias </div>

        <div class="destaque">
            <h2>Notícia Principal</h2>
            <p>Acaba de ser visto o homem mais bonito do IFPA.</p>
        </div>

        <div class="noticias">
            <div class="noticia">
                <h3>Como ele estava?</h3>
                <p>Uniforme, calça preta e tênis Vans.</p>
            </div>

            <div class="noticia">
                <h3>Onde ele mora?</h3>
                <p>Descobrimos que ele mora em Morada Nova.</p>
            </div>
        </div>

    </div>

</body>
</html>
