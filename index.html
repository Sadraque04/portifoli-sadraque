<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página</title>

    <style>
        body{
            background-color: rgb(134, 66, 17);
        }
        h1{
        color: azure;
        text-align: center;
        }
        p{
            font-size: 20px;
        }
        div{
            background-color: blanchedalmond;
            padding: 15px;
            margin: 10px;
            border-bottom: 10px solid rgb(170, 96, 27);
            border-radius: 20px;
            transition: 0.5s;
        }
        div:hover{
            box-shadow: 0 10px 15px rgb(110, 40, 12)
        }
    </style>
</head>

<body>
    <h1>Bem-vindo ao meu site</h1>
    <div>
        <h2>Sobre mim</h2>
        <p>Sou estudante de tecnologia.</p>
    </div>
    <div>
        <h2>Hobbies</h2>
        <p>Gosto de programação e jogos.</p>
    </div>
</body>

</html>
